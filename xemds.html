<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AN TOÀN ĐIỆN VSIP 2026</title>
    
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background: #f8f9fa; padding: 10px; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 450px; padding: 0; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header-box { background: #004085; color: white; padding: 20px; text-align: center; border-radius: 15px 15px 0 0; }
        .header-box h5 { font-weight: bold; text-transform: uppercase; margin: 0; font-size: 1rem; }
        
        .form-group { margin-bottom: 12px; }
        .form-label { font-weight: 600; color: #333; margin-bottom: 5px; display: block; font-size: 0.9rem; }
        .form-control, .form-select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 100%; }
        
        .photo-actions { display: flex; gap: 10px; margin-top: 5px; }
        .btn-photo { 
            flex: 1; padding: 10px 5px; border-radius: 8px; font-weight: bold; font-size: 0.8rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
            border: 2px solid #004085; transition: 0.2s; cursor: pointer;
        }
        .btn-capture { background: #004085; color: white; }
        .btn-browse { background: white; color: #004085; }

        #previewContainer { display: none; text-align: center; margin-top: 15px; border: 2px dashed #004085; padding: 10px; border-radius: 10px; }
        #imagePreview { width: 90px; height: 120px; object-fit: cover; border-radius: 5px; border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .btn-submit { background: #28a745; border: none; padding: 15px; font-weight: bold; border-radius: 10px; width: 100%; color: white; margin-top: 15px; font-size: 1.1rem; }

        /* Bảng danh sách học viên */
        .list-header { background: #e9ecef; padding: 10px; border-radius: 10px 10px 0 0; font-weight: bold; color: #004085; border-bottom: 2px solid #dee2e6; }
        .table-container { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; margin-top: 20px; }
        .table { margin-bottom: 0; font-size: 0.85rem; }
        .table th { background: #f8f9fa; color: #495057; }
        #loadingList { padding: 20px; text-align: center; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-box">
            <h5>ĐĂNG KÝ THÔNG TIN<br>AN TOÀN ĐIỆN VSIP 2026</h5>
        </div>
        <div class="card-body p-3">
            <form id="studentForm">
                <div class="form-group">
                    <label class="form-label">Họ và Tên (Viết HOA)</label>
                    <input type="text" id="fullName" class="form-control text-uppercase" placeholder="NGUYỄN VĂN A" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Phòng</label>
                    <select id="dept" class="form-select" required>
                        <option value="">-- Chọn Phòng --</option>
                        <option value="M&E">M&E</option><option value="PP">PP</option>
                        <option value="W&S">W&S</option><option value="EMD">EMD</option>
                        <option value="CON">CON</option><option value="SHEC">SHEC</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Bậc</label>
                    <select id="level" class="form-select" required>
                        <option value="">-- Chọn Bậc --</option>
                        <option value="1/5">1/5</option><option value="2/5">2/5</option>
                        <option value="3/5">3/5</option><option value="4/5">4/5</option>
                        <option value="5/5">5/5</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Ngày sinh</label>
                    <input type="date" id="dob" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Số CCCD (12 số)</label>
                    <input type="tel" id="idCard" class="form-control" maxlength="12" placeholder="Nhập 12 chữ số" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Chức vụ / Công việc</label>
                    <input type="text" id="job" class="form-control" placeholder="Ví dụ: Kỹ thuật viên" required>
                </div>

                <div class="form-group">
                    <label class="form-label text-danger">Hình thẻ 3x4</label>
                    <div class="photo-actions">
                        <div class="btn-photo btn-capture" onclick="document.getElementById('photoCap').click()">
                            <i class="fa-solid fa-camera fa-lg"></i> CHỤP ẢNH
                        </div>
                        <div class="btn-photo btn-browse" onclick="document.getElementById('photoFile').click()">
                            <i class="fa-solid fa-image fa-lg"></i> CHỌN FILE
                        </div>
                    </div>
                    <input type="file" id="photoCap" accept="image/*" capture="user" style="display:none" onchange="handleFile(this)">
                    <input type="file" id="photoFile" accept="image/*" style="display:none" onchange="handleFile(this)">
                </div>

                <div id="previewContainer">
                    <img id="imagePreview" src="#" alt="Preview">
                </div>

                <button type="button" onclick="sendData()" id="btnSubmit" class="btn btn-submit shadow">GỬI THÔNG TIN VỀ VDC</button>
            </form>
            <div id="status" class="mt-2 text-center fw-bold" style="font-size: 0.9rem;"></div>
        </div>
    </div>

    <div class="table-container">
        <div class="list-header text-center">DANH SÁCH ĐÃ ĐĂNG KÝ</div>
        <div id="loadingList">Đang tải danh sách...</div>
        <table class="table table-striped table-hover d-none" id="studentTable">
            <thead>
                <tr>
                    <th width="15%">STT</th>
                    <th width="55%">Họ và Tên</th>
                    <th width="30%">Phòng</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <p class="text-center mt-3 text-muted" style="font-size: 0.7rem;">VDC Safety Training &copy; 2026</p>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_WiyNUAcAo1O2lj4ITS5mcWFRkNEeYU6gC9n1YKf2l4O58hL-uhIThF2Mi1nZh2njkg/exec";
    let selectedImageData = null;

    // Tự động tải danh sách khi mở trang
    window.onload = loadStudentList;

    function loadStudentList() {
        const script = document.createElement('script');
        const callbackName = 'listCallback';
        window[callbackName] = function(data) {
            const table = document.getElementById('studentTable');
            const tbody = document.getElementById('tableBody');
            const loading = document.getElementById('loadingList');
            
            tbody.innerHTML = "";
            if (data && data.length > 0) {
                data.forEach((item, index) => {
                    const row = `<tr>
                        <td>${index + 1}</td>
                        <td class="text-uppercase fw-bold">${item.name}</td>
                        <td>${item.room}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
                loading.classList.add('d-none');
                table.classList.remove('d-none');
            } else {
                loading.innerText = "Chưa có học viên nào đăng ký.";
            }
            document.body.removeChild(script);
            delete window[callbackName];
        };
        script.src = `${WEB_APP_URL}?action=getList&callback=${callbackName}`;
        document.body.appendChild(script);
    }

    function handleFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageData = e.target.result;
                document.getElementById('imagePreview').src = e.target.result;
                document.getElementById('previewContainer').style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function sendData() {
        const form = document.getElementById('studentForm');
        const idCard = document.getElementById('idCard').value;
        const btn = document.getElementById('btnSubmit');
        const status = document.getElementById('status');

        if (!form.checkValidity() || !selectedImageData) {
            alert("Vui lòng điền đủ thông tin và chọn hình!");
            return;
        }

        btn.disabled = true;
        status.innerHTML = "Đang gửi...";

        const payload = {
            fullName: document.getElementById('fullName').value.toUpperCase(),
            department: document.getElementById('dept').value,
            level: document.getElementById('level').value,
            dob: document.getElementById('dob').value.split('-').reverse().join('/'),
            idCard: idCard,
            jobTitle: document.getElementById('job').value,
            image: selectedImageData
        };

        try {
            await fetch(WEB_APP_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify(payload)
            });
            status.innerHTML = "<span class='text-success'>✓ Gửi thành công!</span>";
            form.reset();
            document.getElementById('previewContainer').style.display = 'none';
            selectedImageData = null;
            // Tải lại danh sách sau khi gửi thành công
            setTimeout(loadStudentList, 2000);
        } catch (error) {
            status.innerHTML = "<span class='text-danger'>Lỗi mạng!</span>";
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
