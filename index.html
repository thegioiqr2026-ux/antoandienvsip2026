<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f9; padding: 10px; font-family: sans-serif; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: #004a99; color: white; padding: 20px; text-align: center; border-radius: 12px 12px 0 0; }
        .btn-primary { background: #004a99; border: none; padding: 12px; font-weight: bold; }
        .found-box { background: #e8f5e9; border: 1px solid #2e7d32; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
<div class="container" style="max-width: 600px;">
    <div class="card mt-3">
        <div class="header">
            <h5 class="mb-0">THÔNG TIN HỌC VIÊN LỚP AN TOÀN ĐIỆN VSIP 2026</h5>
        </div>
        <div class="card-body p-4">
            <div id="foundMsg" class="found-box text-success small">✓ Đã khớp dữ liệu. Phòng và Bậc đã được điền tự động.</div>
            
            <form id="studentForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Họ và Tên (Viết HOA)</label>
                    <div class="input-group">
                        <input type="text" id="fullName" class="form-control" placeholder="NGUYỄN VĂN A" required onblur="lookupName()">
                        <span id="spin" class="spinner-border spinner-border-sm text-primary m-2" style="display:none"></span>
                    </div>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label fw-bold">Bộ phận</label>
                        <select id="dept" class="form-select" required>
                            <option value="">--Chọn--</option>
                            <option value="M&E">M&E</option><option value="PP">PP</option>
                            <option value="W&S">W&S</option><option value="EMD">EMD</option>
                            <option value="CON">CON</option><option value="SHEC">SHEC</option>
                        </select>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label fw-bold">Phòng</label>
                        <input type="text" id="room" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label fw-bold">Bậc</label>
                        <select id="level" class="form-select" required>
                            <option value="">--Chọn--</option>
                            <option value="1/5">1/5</option><option value="2/5">2/5</option>
                            <option value="3/5">3/5</option><option value="4/5">4/5</option>
                            <option value="5/5">5/5</option>
                        </select>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label fw-bold">Ngày sinh</label>
                        <input type="date" id="dob" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Số CMND/CCCD</label>
                    <input type="text" id="idCard" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Chức vụ/ Công việc</label>
                    <input type="text" id="job" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-danger">Hình thẻ 3x4 (Dạng file ảnh)</label>
                    <input type="file" id="photo" accept="image/*" class="form-control" required>
                </div>

                <button type="button" onclick="send()" id="btn" class="btn btn-primary w-100 shadow">GỬI THÔNG TIN VỀ VDC</button>
            </form>
            <div id="status" class="mt-3 text-center fw-bold"></div>
        </div>
    </div>
</div>

<script>
    let studentInfo = { isUpdate: false, row: null };

    function lookupName() {
        const name = document.getElementById('fullName').value;
        if (!name) return;
        document.getElementById('spin').style.display = 'block';

        google.script.run.withSuccessHandler(function(res) {
            document.getElementById('spin').style.display = 'none';
            if (res.exists) {
                studentInfo = { isUpdate: true, row: res.row };
                document.getElementById('foundMsg').style.display = 'block';
                document.getElementById('room').value = res.room || "";
                document.getElementById('level').value = res.level || "";
            } else {
                studentInfo = { isUpdate: false, row: null };
                document.getElementById('foundMsg').style.display = 'none';
                if (!confirm("Họ tên này không có trong danh sách. Bạn có chắc chắn nhập đúng không? Nếu đúng, hệ thống sẽ thêm mới.")) {
                    document.getElementById('fullName').value = "";
                }
            }
        }).checkStudentName(name);
    }

    function send() {
        const file = document.getElementById('photo').files[0];
        if (!file) { alert("Thiếu ảnh!"); return; }

        const b = document.getElementById('btn');
        b.disabled = true;
        document.getElementById('status').innerText = "Đang xử lý...";

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = {
                fullName: document.getElementById('fullName').value.toUpperCase(),
                department: document.getElementById('dept').value,
                room: document.getElementById('room').value,
                level: document.getElementById('level').value,
                dob: document.getElementById('dob').value,
                idCard: document.getElementById('idCard').value,
                jobTitle: document.getElementById('job').value,
                image: e.target.result,
                isUpdate: studentInfo.isUpdate,
                rowNumber: studentInfo.row
            };

            google.script.run.withSuccessHandler(function(msg) {
                document.getElementById('status').innerHTML = "<span class='text-success'>" + msg + "</span>";
                document.getElementById('studentForm').reset();
                document.getElementById('foundMsg').style.display = 'none';
                b.disabled = false;
            }).uploadData(data);
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
