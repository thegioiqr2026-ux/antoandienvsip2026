<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THÔNG TIN HỌC VIÊN AN TOÀN ĐIỆN VSIP 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding: 15px; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 650px; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header-box { background: #004085; color: white; padding: 25px; text-align: center; }
        .header-box h5 { font-weight: bold; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .form-label { font-weight: 600; color: #333; margin-top: 10px; }
        .btn-submit { background: #004085; border: none; font-weight: bold; padding: 15px; transition: 0.3s; }
        .btn-submit:hover { background: #002752; transform: translateY(-2px); }
        #previewContainer { display: none; text-align: center; margin-top: 15px; }
        #imagePreview { max-width: 150px; border: 3px solid #ddd; border-radius: 8px; padding: 5px; background: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="card mt-3">
        <div class="header-box">
            <h5>Thông Tin Học Viên<br>Lớp An Toàn Điện VSIP 2026</h5>
        </div>
        <div class="card-body p-4">
            <form id="studentForm">
                <div class="mb-3">
                    <label class="form-label">Họ và Tên (Viết HOA có dấu)</label>
                    <input type="text" id="fullName" class="form-control text-uppercase" placeholder="NGUYỄN MINH HÒA" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phòng</label>
                        <select id="dept" class="form-select" required>
                            <option value="">-- Chọn Phòng --</option>
                            <option value="M&E">M&E</option>
                            <option value="PP">PP</option>
                            <option value="W&S">W&S</option>
                            <option value="EMD">EMD</option>
                            <option value="CON">CON</option>
                            <option value="SHEC">SHEC</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Bậc</label>
                        <select id="level" class="form-select" required>
                            <option value="">-- Chọn Bậc --</option>
                            <option value="1/5">1/5</option>
                            <option value="2/5">2/5</option>
                            <option value="3/5">3/5</option>
                            <option value="4/5">4/5</option>
                            <option value="5/5">5/5</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ngày sinh (dd/mm/yyyy)</label>
                        <input type="date" id="dob" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Số CCCD (Đủ 12 số)</label>
                        <input type="text" id="idCard" class="form-control" pattern="\d{12}" maxlength="12" placeholder="Ví dụ: 079123456789" required title="Vui lòng nhập đủ 12 chữ số CCCD">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Chức vụ / Công việc</label>
                    <input type="text" id="job" class="form-control" placeholder="Ví dụ: Nhân viên kỹ thuật điện" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-danger">Hình thẻ 3x4 (Chụp rõ mặt)</label>
                    <input type="file" id="photo" accept="image/*" class="form-control" required onchange="previewImage(this)">
                </div>

                <div id="previewContainer">
                    <p class="small fw-bold text-muted">Ảnh đã chọn:</p>
                    <img id="imagePreview" src="#" alt="Xem trước hình ảnh">
                </div>

                <button type="button" onclick="sendData()" id="btnSubmit" class="btn btn-primary btn-submit w-100 shadow-sm text-white mt-4">
                    GỬI THÔNG TIN VỀ VDC
                </button>
            </form>
            <div id="status" class="mt-3 text-center fw-bold"></div>
        </div>
    </div>
    <p class="text-center mt-4 text-muted small">Hệ thống quản lý đào tạo VDC &copy; 2026</p>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz_WiyNUAcAo1O2lj4ITS5mcWFRkNEeYU6gC9n1YKf2l4O58hL-uhIThF2Mi1nZh2njkg/exec";

    // Hàm xem trước ảnh khi chọn file
    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        const container = document.getElementById('previewContainer');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                container.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Hàm định dạng ngày dd/MM/yyyy
    function formatDate(dateStr) {
        if(!dateStr) return "";
        const parts = dateStr.split('-');
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    async function sendData() {
        const form = document.getElementById('studentForm');
        const fileInput = document.getElementById('photo');
        const file = fileInput.files[0];
        
        // Kiểm tra CCCD 12 số
        const idCard = document.getElementById('idCard').value;
        if (idCard.length !== 12 || isNaN(idCard)) {
            alert("Số CCCD phải bao gồm đúng 12 chữ số!");
            return;
        }

        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const btn = document.getElementById('btnSubmit');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerHTML = "<span class='text-primary'>Đang tải dữ liệu và ảnh lên hệ thống...</span>";

        const reader = new FileReader();
        reader.onload = async function(e) {
            const payload = {
                fullName: document.getElementById('fullName').value.toUpperCase(),
                department: document.getElementById('dept').value, // Đây là giá trị Phòng
                level: document.getElementById('level').value,
                dob: formatDate(document.getElementById('dob').value), // Chuyển sang dd/MM/yyyy
                idCard: idCard,
                jobTitle: document.getElementById('job').value,
                image: e.target.result
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                status.innerHTML = "<span class='text-success'>✓ Gửi thông tin thành công! Cảm ơn bạn.</span>";
                form.reset();
                document.getElementById('previewContainer').style.display = 'none';
            } catch (error) {
                status.innerHTML = "<span class='text-danger'>Có lỗi xảy ra. Vui lòng thử lại.</span>";
                console.error("Error:", error);
            }
            btn.disabled = false;
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
